[project]
authors = [
    {name = "Arch4ngel21", email = "adammichal657@gmail.com"},
]
license = {text = "MIT"}
requires-python = "<4.0,>=3.10"
dependencies = [
    "numpy<3.0.0,>=2.2.6",
    "pandas<3.0.0,>=2.3.0",
]
name = "gowermetric"
version = "0.1.0"
description = ""
readme = "README.md"

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio<2.0.0,>=1.0.0",
    "setuptools",
    "black>=22.8.0",
    "rpy2>=3.6.1",
    "scipy>=1.15.3",
    "scikit-learn>=1.7.1",
]

[tool.black]
line-length = 79
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''
