[project]
authors = [
    {name = "Arch4ngel21", email = "adammichal657@gmail.com"},
]
license-files = ["LICENSE.md"]
requires-python = ">=3.10, <3.14"
dependencies = [
    "numpy<3.0.0,>=2.2.6",
    "pandas<3.0.0,>=2.3.0",
]
name = "gower-metric"
version = "1.0.0"
description = "A Python implementation of the Gower distance metric for mixed data types."
readme = "README.md"

[tool.setuptools]
packages = ["gower_metric", "gower_metric.core", "gower_metric.distances", "gower_metric.utils", "gower_metric.utils.kde_types", "gower_metric.weights"]
include-package-data = true

[tool.uv.workspace]
members = [
    ".",
    ".",
]

[tool.uv.sources]
gower-metric = { workspace = true }

[dependency-groups]
dev = [
    "check-manifest>=0.50",
    "gower-metric",
    "ipykernel>=6.30.1",
    "joblib>=1.5.1",
    "mypy>=1.17.0",
    "numpy>=2.2.6",
    "openml>=0.15.1",
    "pandas>=2.3.1",
    "pip>=25.2",
    "pre-commit>=4.3.0",
    "pytest>=8.4.1",
    "pytest-asyncio>=1.1.0",
    "rpy2>=3.6.1",
    "scikit-learn>=1.7.1",
    "seaborn>=0.13.2",
    "tqdm>=4.67.1",
    "tqdm-joblib>=0.0.5",
    "twine>=6.2.0",
]

tests = [
    "pytest-asyncio<2.0.0,>=1.0.0",
    "scipy>=1.15.3",
    "scikit-learn>=1.7.1",
    "pytest>=8.4.1",
    "setuptools>=80.9.0",
    "mypy>=1.17.0",
]

r_env_tests = [
    "mypy>=1.17.0",
    "pytest>=8.4.1",
    "pytest-asyncio<2.0.0,>=1.0.0",
    "rpy2>=3.6.1",
    "setuptools>=80.9.0",
]

[build-system]
build-backend = "setuptools.build_meta"
requires = ["setuptools", "wheel"]
