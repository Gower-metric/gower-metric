[tool.poetry]
name = "gowermetric"
version = "0.1.0"
description = ""
authors = ["Arch4ngel21 <adammichal657@gmail.com>"]
readme = "README.md"
license = "MIT"
packages = [
    { include = "gower_similarity" }
]

[tool.poetry.dependencies]
python = "^3.10"

numpy = "^2.2.6"
pandas = "^2.3.0"

[tool.poetry.dev-dependencies]
black = "^22.8.0"
unittest2 = "^1.1.0"
pytest = "^8.3.3"

[tool.poetry.group.dev.dependencies]
pytest-asyncio = "^1.0.0"
rpy2 = "^3.6.1"

[tool.black]
line-length = 79
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
