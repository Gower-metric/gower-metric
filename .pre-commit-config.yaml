repos:
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy --package gower_similarity --package tests
        language: system
        pass_filenames: false

  - repo: https://github.com/pypa/pip-audit
    rev: v2.9.0
    hooks:
      - id: pip-audit
        args: [
          --vulnerability-service, "pypi",
          --cache-dir, ".pip_audit_cache",
          --ignore-vuln, "GHSA-5rjg-fvgr-3xxf"
        ]