repos:
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy --package gower_metric --package tests --package examples --package comparison
        language: system
        pass_filenames: false

  - repo: https://github.com/pypa/pip-audit
    rev: v2.10.0
    hooks:
      - id: pip-audit
        args: [
          --vulnerability-service, "pypi",
          --cache-dir, ".pip_audit_cache",
          --ignore-vuln, "GHSA-5rjg-fvgr-3xxf",
          --ignore-vuln, "GHSA-4xh5-x5gv-qwph",
          --ignore-vuln, "GHSA-gm62-xv2j-4w53",
          --ignore-vuln, "GHSA-2xpw-w6gg-jr37",
          --ignore-vuln, "GHSA-w853-jp5j-5j7f",
        ]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff
        args: [--fix, --unsafe-fixes]
      - id: ruff-format